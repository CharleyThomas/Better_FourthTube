name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    # 1. Always build the main stable app first
    - name: Build Main App
      run: |
        make clean
        make
    
    - name: Save Main App Files
      run: |
        cp FourthTube.cia Better_FourthTube.cia
        cp FourthTube.3dsx Better_FourthTube.3dsx

    # 2. Build the Sandbox safely by swapping just the main file
    - name: Build Test Sandbox
      run: |
        mv source/main.cpp main_bak.cpp
        cp test/source/main.cpp source/main.cpp
        make clean
        make
        mv FourthTube.cia test.cia
        mv FourthTube.3dsx test.3dsx
        rm source/main.cpp
        mv main_bak.cpp source/main.cpp
      continue-on-error: true

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Latest Release #${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia
