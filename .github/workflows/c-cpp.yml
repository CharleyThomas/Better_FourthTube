name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    # 1. Build the main production app
    - name: Build Main App
      run: make
      
    - name: Rename Main CIA file
      run: mv FourthTube.cia Better_FourthTube.cia

    # Clean the build files so they don't mix
    - name: Clean Build Space
      run: make clean

    # 2. Swap the source folders and build the Test Sandbox
    - name: Build Test Sandbox
      run: |
        mv source source_bak
        mv test/source source
        make
        mv FourthTube.cia test.cia
        mv FourthTube.3dsx test.3dsx
        mv source test/source
        mv source_bak source
      continue-on-error: true

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Latest Release #${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia
