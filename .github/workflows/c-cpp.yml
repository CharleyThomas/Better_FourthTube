name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: |
          FourthTube.3dsx
          FourthTube.cia

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Latest Release #${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          FourthTube.3dsx
          FourthTube.cia
