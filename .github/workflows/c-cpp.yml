name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    # 1. Check if the commit message says "release: vX.X.X"
    - name: Check for Release Trigger
      id: check_release
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        # This looks for "release: v" followed by numbers/dots
        if [[ "$COMMIT_MSG" =~ release:\ (v[0-9]+\.[0-9]+\.[0-9]+) ]]; then
          VERSION="${BASH_REMATCH[1]}"
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "rel_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Triggering release for version: $VERSION"
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "Normal commit. Skipping public release step."
        fi

    # 2. Build the main production app
    - name: Build Main App
      run: |
        make clean
        make
    
    # Save main app files securely before clearing the workspace
    - name: Save Main App Files
      run: |
        cp FourthTube.cia Better_FourthTube.cia
        cp Better_FourthTube.3dsx main_app_backup.3dsx

    # Clean the intermediate object files safely
    - name: Clean Build Space
      run: make clean

    # 3. Build the Sandbox safely by swapping just the main file
    - name: Build Test Sandbox
      run: |
        mv source/main.cpp main_bak.cpp
        cp test/source/main.cpp source/main.cpp
        make clean
        make
        mv FourthTube.cia test.cia
        rm -f Better_FourthTube.3dsx
        rm source/main.cpp
        mv main_bak.cpp source/main.cpp
      continue-on-error: true

    # Restore the backup name for uploading
    - name: Restore Main App 3dsx Name
      run: mv main_app_backup.3dsx Better_FourthTube.3dsx

    # 4. Upload binary as an artifact (Available on every single commit!)
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ github.run_number }}
        path: |
          Better_FourthTube.cia
          Better_FourthTube.3dsx
          test.cia

    # 5. Create GitHub Pre-Release (Only if commit message matched)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_release.outputs.should_release == 'true'
      with:
        tag_name: ${{ steps.check_release.outputs.rel_version }}
        name: "Better_FourthTube ${{ steps.check_release.outputs.rel_version }}"
        draft: false
        prerelease: true # Keeps the orange Pre-release label!
        files: |
          Better_FourthTube.cia
          Better_FourthTube.3dsx
          test.cia
