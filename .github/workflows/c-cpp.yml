name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    # 1. Build the main production app exactly like before
    - name: Build Main App
      run: make
      
    - name: Rename Main CIA file
      run: mv FourthTube.cia Better_FourthTube.cia

    # 2. Build your sandbox environment inside the test folder
    # We copy the setup files and compile a separate test binary
    - name: Build Test Sandbox
      run: |
        cp Makefile test/
        cd test
        make
        mv *.cia ../test.cia
        mv *.3dsx ../test.3dsx
      continue-on-error: true # This ensures if your test code has a typo, your main build doesn't fail!

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Latest Release #${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          Better_FourthTube.3dsx
          Better_FourthTube.cia
          test.3dsx
          test.cia
