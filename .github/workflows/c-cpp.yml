name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    # 1. Parse the single-line layout from the BOTTOM of release_log.md
    - name: Parse Release Log
      id: log_parser
      run: |
        LAST_LINE=$(tail -n 1 release_log.md | xargs)
        
        # Check if it starts with [official] or [dev]
        case "$LAST_LINE" in
          "[official]"*|"[dev]"*)
            # Extract the type (official or dev)
            TYPE=$(echo "$LAST_LINE" | cut -d'-' -f1 | tr -d '[]' | xargs)
            # Extract the version (vXX.X.X)
            VERSION=$(echo "$LAST_LINE" | cut -d'-' -f2 | xargs)
            # Extract the title
            TITLE=$(echo "$LAST_LINE" | cut -d'-' -f3- | xargs)
            
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "rel_version=$VERSION" >> $GITHUB_OUTPUT
            echo "rel_title=$TITLE" >> $GITHUB_OUTPUT
            
            if [ "$TYPE" = "dev" ]; then
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
              echo "Triggering Dev Pre-Release: $VERSION - $TITLE"
            else
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
              echo "Triggering Official Latest Release: $VERSION - $TITLE"
            fi
            ;;
          *)
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release tag detected at the bottom of release_log.md. Just building code."
            ;;
        esac

    # 2. Build the main production app
    - name: Build Main App
      run: |
        make clean
        make
    
    # Save main app files securely before clearing the workspace
    - name: Save Main App Files
      run: |
        cp FourthTube.cia Better_FourthTube.cia
        cp Better_FourthTube.3dsx main_app_backup.3dsx

    # Clean the intermediate object files safely
    - name: Clean Build Space
      run: make clean

    # 3. Build the Sandbox safely by swapping just the main file
    - name: Build Test Sandbox
      run: |
        mv source/main.cpp main_bak.cpp
        cp test/source/main.cpp source/main.cpp
        make clean
        make
        mv FourthTube.cia test.cia
        rm -f Better_FourthTube.3dsx
        rm source/main.cpp
        mv main_bak.cpp source/main.cpp
      continue-on-error: true

    # Restore the backup name for uploading
    - name: Restore Main App 3dsx Name
      run: mv main_app_backup.3dsx Better_FourthTube.3dsx

    # 4. Upload binary as an artifact (Available on every single commit!)
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ github.run_number }}
        path: |
          Better_FourthTube.cia
          Better_FourthTube.3dsx
          test.cia

    # 5. Create GitHub Release (Only if release_log.md has a valid tag at the bottom)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.log_parser.outputs.should_release == 'true'
      with:
        tag_name: ${{ steps.log_parser.outputs.rel_version }}
        name: "${{ steps.log_parser.outputs.rel_title }}"
        draft: false
        prerelease: ${{ steps.log_parser.outputs.is_prerelease }}
        make_latest: ${{ steps.log_parser.outputs.is_prerelease == 'false' }}
        files: |
          Better_FourthTube.cia
          Better_FourthTube.3dsx
          test.cia
